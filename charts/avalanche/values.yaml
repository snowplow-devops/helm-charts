# Avalanche Helm Chart - Default Values
# Override these in values-local.yaml or via --set flags

# Global settings (Snowplow helm-charts convention)
global:
  # Cloud provider: aws, gcp, or azure
  cloud: ""
  # Global labels applied to all resources (merged into snowplow.labels)
  labels: {}

# Deployment mode toggle
# true (default): each pod loads its config from disk via --config=/configs/X.yaml
# false: each pod starts with NATS URL + role only and sets AVALANCHE_MANAGED=true,
#   then waits for config from the controller over NATS
# The ConfigMap content is unchanged either way; only the deployment args/env differ.
legacyMode: true

# Sizing preset. Selects per-component CPU/memory/replicas/workers defaults from
# the `presets:` map below.
#
# Per-component overrides (`<component>.replicas`, `<component>.resources`,
# `injector.config.workers`) win when set to a non-zero/non-empty value.
#
#   small  — smoke tests, kind/docker-desktop  (~100 RPS injector ceiling)
#   medium — sustained multi-k RPS             (~2000 RPS target — default)
#   large  — high-throughput perf baselines    (1 injector @ 4 CPU / 100 workers)
sizingPreset: medium  # small | medium | large

# Sizing presets — see ticket QA-780 for the rationale behind these values.
# Add a new preset by adding a top-level key here and pointing `sizingPreset` at it.
presets:
  small:
    injector:
      replicas: 1
      workers: 3
      resources:
        requests: { cpu: "100m", memory: "64Mi" }
        limits:   { cpu: "500m", memory: "256Mi" }
    observer:
      replicas: 1
      resources:
        requests: { cpu: "100m", memory: "64Mi" }
        limits:   { cpu: "500m", memory: "256Mi" }
    correlator:
      replicas: 1
      resources:
        requests: { cpu: "100m", memory: "128Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }
    adjudicator:
      replicas: 1
      resources:
        requests: { cpu: "100m", memory: "64Mi" }
        limits:   { cpu: "500m", memory: "256Mi" }
    controller:
      replicas: 1
      resources:
        requests: { cpu: "100m", memory: "128Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }
    aggregator:
      replicas: 1
      resources:
        requests: { cpu: "100m", memory: "64Mi" }
        limits:   { cpu: "500m", memory: "256Mi" }
    aggregatorKubernetes:
      replicas: 1
      resources:
        requests: { cpu: "100m", memory: "64Mi" }
        limits:   { cpu: "500m", memory: "256Mi" }
    observerKubernetes:
      replicas: 1
      resources:
        requests: { cpu: "100m", memory: "64Mi" }
        limits:   { cpu: "500m", memory: "256Mi" }
    nats:
      replicas: 1
      resources:
        requests: { cpu: "100m", memory: "64Mi" }
        limits:   { cpu: "500m", memory: "256Mi" }

  medium:
    injector:
      replicas: 1
      workers: 50
      resources:
        requests: { cpu: "500m", memory: "512Mi" }
        limits:   { cpu: "2000m", memory: "2Gi" }
    observer:
      replicas: 1
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "1000m", memory: "1Gi" }
    correlator:
      replicas: 1
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "1000m", memory: "1Gi" }
    adjudicator:
      replicas: 1
      resources:
        requests: { cpu: "200m", memory: "128Mi" }
        limits:   { cpu: "1000m", memory: "512Mi" }
    controller:
      replicas: 1
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "1000m", memory: "1Gi" }
    aggregator:
      replicas: 1
      resources:
        requests: { cpu: "200m", memory: "128Mi" }
        limits:   { cpu: "1000m", memory: "512Mi" }
    aggregatorKubernetes:
      replicas: 1
      resources:
        requests: { cpu: "100m", memory: "128Mi" }
        limits:   { cpu: "500m", memory: "256Mi" }
    observerKubernetes:
      replicas: 1
      resources:
        requests: { cpu: "100m", memory: "128Mi" }
        limits:   { cpu: "500m", memory: "256Mi" }
    nats:
      replicas: 1
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "1000m", memory: "1Gi" }

  large:
    injector:
      # Multi-replica injector wiring is not yet supported by the controller —
      # all replicas would receive the same per-injector RPS via NATS pub/sub
      # and inject in parallel, multiplying total RPS by the replica count.
      # Tracked separately as a scaling task; pinned to 1 across all presets
      # for now. Differentiate via CPU/memory/workers per pod instead.
      replicas: 1
      workers: 100
      resources:
        requests: { cpu: "1000m", memory: "1Gi" }
        limits:   { cpu: "4000m", memory: "4Gi" }
    observer:
      replicas: 1
      resources:
        requests: { cpu: "500m", memory: "512Mi" }
        limits:   { cpu: "2000m", memory: "2Gi" }
    correlator:
      replicas: 1
      resources:
        requests: { cpu: "500m", memory: "512Mi" }
        limits:   { cpu: "2000m", memory: "2Gi" }
    adjudicator:
      replicas: 1
      resources:
        requests: { cpu: "500m", memory: "256Mi" }
        limits:   { cpu: "2000m", memory: "1Gi" }
    controller:
      replicas: 1
      resources:
        requests: { cpu: "500m", memory: "512Mi" }
        limits:   { cpu: "2000m", memory: "2Gi" }
    aggregator:
      replicas: 1
      resources:
        requests: { cpu: "500m", memory: "256Mi" }
        limits:   { cpu: "2000m", memory: "1Gi" }
    aggregatorKubernetes:
      replicas: 1
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "1000m", memory: "512Mi" }
    observerKubernetes:
      replicas: 1
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "1000m", memory: "512Mi" }
    nats:
      replicas: 1
      resources:
        requests: { cpu: "500m", memory: "512Mi" }
        limits:   { cpu: "2000m", memory: "2Gi" }

# Cloud service account configuration (OIDC-based IAM integration)
cloudserviceaccount:
  # Whether to create a service-account
  deploy: false
  # Name of the service-account to create
  name: "avalanche-service-account"
  aws:
    # IAM Role ARN to bind to the k8s service account (set by DS4)
    roleARN: ""
  gcp:
    # Service Account email to bind to the k8s service account
    serviceAccount: ""
  azure:
    # Workload managed identity id
    managedIdentityId: ""

# Docker config for private registry authentication
dockerconfigjson:
  # Name of the secret for private repository
  name: "avalanche-dockerhub"
  # Username for private repository
  username: ""
  # Password for private repository
  password: ""
  # Repository server URL
  server: "https://index.docker.io/v1/"
  # Email address
  email: ""

# Per-component image settings
# Note: imagePullPolicy and imageRegistry remain at per-component level, not in global
images:
  # Default image pull policy - use IfNotPresent for registry, Never for local images
  pullPolicy: IfNotPresent
  # Log level for all components
  logLevel: info
  # Registry prefix for Avalanche images
  # - Set to "snowplow" for private DockerHub images
  # - Override in values-local.yaml with pullPolicy: Never for local development
  registry: "snowplow"

# NATS configuration
nats:
  enabled: true
  image:
    repository: nats
    tag: "2.10-alpine"
    pullPolicy: IfNotPresent
  # 0 = inherit from sizingPreset; set to a non-zero value to override.
  replicas: 0
  # {} = inherit from sizingPreset; set requests/limits to override.
  resources: {}
  service:
    type: ClusterIP
    clientPort: 4222
    monitoringPort: 8222

# Injector configuration
injector:
  enabled: true
  image:
    repository: avalanche-injector-private
    tag: latest
  # 0 = inherit from sizingPreset; set to a non-zero value to override.
  replicas: 0
  componentId: "k8s-injector"
  config:
    type: "http"
    name: "k8s-injector"
    endpoint: "http://host.docker.internal:8085"
    # Collector-less (raw Kinesis) delivery for the snowplow injector (QA-1232).
    # Set delivery.mode: kinesis to make the injector write CollectorPayload Thrift
    # records straight to the raw stream; in kinesis mode `endpoint` above is NOT
    # rendered (it is ignored, so it need not be cleared), and streamArn + region
    # are required (the chart fails to render if either is missing). mode: http
    # (or leaving delivery unset) keeps the default endpoint-based delivery.
    # delivery:
    #   mode: "kinesis"           # "http" (default) or "kinesis"
    #   streamArn: ""             # raw collector_payloads stream ARN (required when mode: kinesis)
    #   region: ""                # AWS region of the stream (required when mode: kinesis)
    #   partitionKey: "random"    # "random" (default) or "correlation_id"
    # Protocol for HTTP injector type (not used by snowplow type).
    protocol: "http"
    # 0 = inherit from sizingPreset; set to a non-zero value to override.
    workers: 0
    timeout: "5s"
    # Skip TLS certificate verification (useful for testing with self-signed certs)
    insecureSkipVerify: false
    # Generator config for snowplow injector type (go-event-generator)
    # generator:
    #   preset: "typical-web"
    #   seed: 0
  # {} = inherit from sizingPreset; set requests/limits to override.
  resources: {}

# Observer configuration
observer:
  enabled: true
  image:
    repository: avalanche-observer-private
    tag: latest
  # 0 = inherit from sizingPreset; set to a non-zero value to override.
  replicas: 0
  componentId: "k8s-observer"
  config:
    type: "mockserver"
    name: "k8s-observer"
    endpoint: "http://host.docker.internal:8085"
    checkInterval: "1s"
    tolerance: 0.05
    # For snowplow-kinesis observer type:
    # streamArn: ""  # AWS Kinesis stream ARN
    # region: ""     # AWS region
  # {} = inherit from sizingPreset; set requests/limits to override.
  resources: {}

# Mock Target configuration (self-contained testing without external collector)
mockTarget:
  enabled: false  # Enable for self-contained testing (no external collector needed)
  image:
    repository: avalanche-mock-target-private
    tag: latest
  replicas: 1
  port: 8085
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

# Correlator configuration
correlator:
  enabled: true
  image:
    repository: avalanche-correlator-private
    tag: latest
  # 0 = inherit from sizingPreset; set to a non-zero value to override.
  replicas: 0
  componentId: "k8s-correlator"
  # Metrics write interval in seconds (how often to write aggregated stats to database)
  # Lower values give more granular data but increase database load
  metricsWriteIntervalSeconds: 30
  config:
    type: "default"
    name: "k8s-correlator"
    correlationWindow: "30s"
    correlationTimeout: "5s"
    checkInterval: "1s"
    tolerance: 0.05
  service:
    type: ClusterIP
    port: 8090
  # {} = inherit from sizingPreset; set requests/limits to override.
  resources: {}

# Adjudicator configuration
adjudicator:
  enabled: true
  image:
    repository: avalanche-adjudicator-private
    tag: latest
  # 0 = inherit from sizingPreset; set to a non-zero value to override.
  replicas: 0
  componentId: "k8s-adjudicator"
  config:
    type: "adjudicator"
    name: "k8s-adjudicator"
    failFastEnabled: true
    failFastCheckInterval: "10s"
    finalValidationEnabled: true
    finalValidationTimeout: "30s"
  rules:
    default: |
      // Default validation rule
      correlation_rate >= 0.95 && error_rate <= 0.05
  # {} = inherit from sizingPreset; set requests/limits to override.
  resources: {}

# Controller configuration
controller:
  enabled: true
  image:
    repository: avalanche-controller-private
    tag: latest
  # 0 = inherit from sizingPreset; set to a non-zero value to override.
  replicas: 0
  componentId: "k8s-controller"
  apiPort: 8080
  config:
    type: "controller"
    name: "k8s-controller"
    maxConcurrentTests: 5
    testTimeout: "30m"
    testPlansDir: "/test-plans"
  service:
    type: NodePort
    port: 8080
    nodePort: 30080
  # Ingress configuration for external access via Traefik
  ingress:
    enabled: false  # Set to true to create an Ingress resource
    # Enable Traefik ingress class and entrypoints (default: true)
    enableTraefik: true
    # Additional annotations for the Ingress
    annotations: {}
    # Hostname for the Ingress (e.g., my-uuid.svc.snplow.net)
    hostname: ""
    # Path for the Ingress
    path: /
    pathType: Prefix
    # TLS secret name (defaults to {hostname-with-dashes}-tls)
    tlsSecretName: ""
  # {} = inherit from sizingPreset; set requests/limits to override.
  resources: {}

# Aggregator configuration (injection timing metrics)
aggregator:
  enabled: false  # Disabled by default - enable when using InfluxDB
  image:
    repository: avalanche-aggregator-private
    tag: latest
  # 0 = inherit from sizingPreset; set to a non-zero value to override.
  replicas: 0
  componentId: "k8s-aggregator"
  config:
    type: "metrics-aggregator"
    name: "k8s-aggregator"
    sourceMeasurement: "injected_events"
    outputMeasurement: "injection_stats_window"
    windowDuration: "10s"
    groupBy:
      - run_id
      - phase_id
    fields:
      total_duration_ms:
        - p50
        - p90
        - p95
        - p99
        - max
        - mean
        - count
      time_to_first_byte_ms:
        - p50
        - p95
        - p99
        - max
      tcp_connection_time_ms:
        - p50
        - p95
        - max
  # {} = inherit from sizingPreset; set requests/limits to override.
  resources: {}

# Kubernetes Monitoring Aggregator configuration (Phase 12.3)
# Aggregates kubernetes_monitoring metrics into window/phase/run statistics
aggregatorKubernetes:
  enabled: false  # Set to true when observerKubernetes.enabled=true (must be enabled manually)
  image:
    repository: avalanche-aggregator-private
    tag: latest
  # 0 = inherit from sizingPreset; set to a non-zero value to override.
  replicas: 0
  componentId: "kubernetes-aggregator"
  config:
    type: "metrics-aggregator"
    name: "kubernetes-monitoring-aggregator"
    sourceMeasurement: "kubernetes_monitoring"
    # QA-1233: read only the in-cluster (metrics-server) observer's rows. When the
    # cloudwatch observer also writes kubernetes_monitoring for the same pods, this
    # keeps the window/phase/run rollups single-source instead of duplicating every
    # component. Empty map = no filter (other aggregators leave this unset).
    sourceFilter:
      source: "k8s-api"
    # Multi-level output measurements
    outputMeasurements:
      window: "kubernetes_monitoring_window"
      phase: "kubernetes_monitoring_phase"
      run: "kubernetes_monitoring_run"
    windowDuration: "30s"
    # `role` (QA-827 Phase 2) lets the aggregator emit (role × phase) rows
    # alongside the legacy per-pod rows. CEL rules in Phase 3 reference
    # those role-tagged aggregates as `<role>.<metric>_<stat>`.
    groupBy:
      - run_id
      - phase_id
      - namespace
      - pod
      - role
    fields:
      pod_count:
        - last
        - max
        - min
      pod_ready_count:
        - last
        - min
      pod_restart_count:
        - last
        - max
      cpu_usage_millicores:
        - mean
        - max
        - min
        - spread
        - p95
      cpu_limit_millicores:
        - last
      memory_usage_bytes:
        - mean
        - max
        - min
        - spread
        - p95
      memory_limit_bytes:
        - last
      deployment_available_replicas:
        - last
        - min
      deployment_desired_replicas:
        - last
      warning_event_count:
        - last
        - max
      error_event_count:
        - last
        - max
      # CloudWatch-mode fields (QA-822). The CW observer writes percent-of-limit
      # and percent-of-cluster fields; these aren't produced by the api-mode
      # observer, but adding them to the aggregator's whitelist is harmless
      # there (missing fields aggregate to zero) and makes both observer
      # paths feed equivalent (entity × phase) rows.
      cpu_usage_percent_of_limit:
        - mean
        - max
        - min
        - spread
        - p95
      memory_usage_percent_of_limit:
        - mean
        - max
        - min
        - spread
        - p95
      cpu_usage_percent_of_cluster:
        - mean
        - max
        - sum
      memory_usage_percent_of_cluster:
        - mean
        - max
        - sum
      network_tx_bytes:
        - sum
        - max
      container_restarts:
        - last
        - max
        - sum
  # {} = inherit from sizingPreset; set requests/limits to override.
  resources: {}

# Kinesis Stream Aggregator configuration (QA-827 Phase 2)
# Aggregates kinesis_stream_monitoring per-stream rows into (stream × phase)
# windows for CEL acceptance rules. Mirrors aggregatorKubernetes — separate
# deployment, separate ConfigMap entry, same code path; only differs in
# source measurement, group-by tag, and field whitelist.
aggregatorKinesisStream:
  enabled: false  # enable when observerKubernetes.cloudwatch is observing a kinesis_stream target
  image:
    repository: avalanche-aggregator-private
    tag: latest
  replicas: 1
  componentId: "kinesis-stream-aggregator"
  config:
    type: "metrics-aggregator"
    name: "kinesis-stream-aggregator"
    sourceMeasurement: "kinesis_stream_monitoring"
    outputMeasurements:
      window: "kinesis_stream_monitoring_window"
      phase: "kinesis_stream_monitoring_phase"
      run: "kinesis_stream_monitoring_run"
    windowDuration: "60s"  # CW kinesis is 60s resolution; window matches
    groupBy:
      - run_id
      - phase_id
      - region
      - stream_name
    fields:
      incoming_bytes:
        - sum
        - max
      incoming_records:
        - sum
        - max
      outgoing_bytes:
        - sum
        - max
      outgoing_records:
        - sum
        - max
      put_records_latency_ms:
        - mean
        - max
        - min
        - spread
        - p95
      iterator_age_ms_max:
        - max
        - mean
      write_provisioned_throughput_exceeded:
        - sum
        - max
      read_provisioned_throughput_exceeded:
        - sum
        - max
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

# Database configuration (optional)
database:
  # Database type: memory, influxdb, timestream
  type: ""
  # InfluxDB configuration
  influxdb:
    url: ""
    token: ""
    org: "snowplow"
    bucket: "avalanche-metrics"
  # Timestream configuration
  timestream:
    database: ""
    region: ""

# AWS credentials (for Kinesis observer or Timestream)
# For local deployments: Set accessKeyId and secretAccessKey to create a Kubernetes Secret
# For DS4/EKS deployments: Leave credentials empty - IRSA provides credentials via service account
aws:
  region: "eu-central-1"
  # Local only: AWS access key ID (creates Secret when set)
  accessKeyId: ""
  # Local only: AWS secret access key
  secretAccessKey: ""
  # Local only: AWS session token (optional, for temporary credentials)
  sessionToken: ""

# Prometheus JVM Observer configuration (QA-1121)
# Scrapes a Prometheus /metrics endpoint (e.g. Enrich's health-probe port, which
# serves /metrics when the common-streams Micrometer→Prometheus reporter is
# enabled) and records the jvm_* series (heap / GC / threads) to the metrics DB.
# Pure-Go HTTP scraper — no JMX. For AWS auth to write metrics: when
# cloudserviceaccount.deploy is true (e.g. DS4) the pod reuses that
# ServiceAccount for its Timestream IRSA role; otherwise (sandbox/local) it
# runs under the default ServiceAccount with AWS creds injected via aws.*.
observerPrometheus:
  enabled: false
  image:
    repository: avalanche-observer-private
    tag: latest
  replicas: 1
  componentId: "prometheus-jvm-observer"
  config:
    type: "prometheus-jvm"
    name: "prometheus-jvm-observer"
    pollInterval: "15s"
    metricPrefixes:
      - "jvm_"
    # List of Prometheus /metrics endpoints to scrape. Each entry: url (required,
    # absolute http(s) URL), role (optional identity tag), timeout (optional).
    targets: []
    # Example:
    #   targets:
    #     - url: "http://my-enrich.svc.cluster.local:8000/metrics"
    #       role: "enrich"
  # Preset-independent plain resource block (does not use sizingPreset).
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# Kubernetes Infrastructure Observer configuration (Phase 12.1 + QA-822)
observerKubernetes:
  enabled: false  # master toggle — disabled by default; enable to monitor infra
  # QA-1233: exclude churny auxiliary pods from BOTH observers (api + cloudwatch).
  # enrich's KCL checkpoint monitor runs as a CronJob and spawns many short-lived
  # pods that pollute the k8s panels and inflate aggregate counts. The pattern is
  # OR-composed into each observer's effective pod_name_exclude (it does not
  # overwrite a caller-supplied exclude or the cloudwatch self-observation guard).
  # Set excludeAuxiliaryPods=false to observe kclmon (e.g. to investigate it).
  excludeAuxiliaryPods: true
  auxiliaryPodPattern: "kclmon"
  # api and cloudwatch are independent observers that can be enabled together
  # or separately. The previous `mode: api|cloudwatch` toggle has been removed
  # in favour of these sub-toggles so a deployment can collect native K8s
  # metrics AND AWS CloudWatch metrics (e.g. Kinesis stream observation)
  # concurrently — useful when you have K8s API access and want both.
  rbac:
    # QA-1057. Scope of the RBAC granted to the (api) observer:
    #   cluster   — ClusterRole/ClusterRoleBinding (default). Lets the observer
    #               watch all namespaces (config.namespace: "" → Pods("").List()).
    #   namespace — Role/RoleBinding in the release namespace only (least
    #               privilege). The observer makes only namespaced API calls
    #               (pods/deployments/events + metrics.k8s.io/pods) and never
    #               reads nodes/namespaces, so NO collected metric is lost — the
    #               only thing given up is cross-namespace watching. In this mode
    #               config.namespace is FORCED to .Release.Namespace (see
    #               configmap.yaml); a namespaced Role cannot authorize the
    #               cluster-wide Pods("").List() that an empty namespace implies.
    scope: cluster
  api:
    # Native Kubernetes API observer: reads pod / deployment / event / resource
    # metrics from the in-cluster K8s API + metrics-server. Requires the RBAC
    # defined in observer-kubernetes-rbac.yaml — a ClusterRole/ClusterRoleBinding
    # when rbac.scope=cluster, or a namespaced Role/RoleBinding when
    # rbac.scope=namespace (see rbac.scope above).
    enabled: true
  cloudwatch:
    # CloudWatch observer (QA-824 + QA-828): reads pod-level Container Insights
    # metrics and/or AWS/Kinesis stream metrics via IRSA. See targets[].kind for
    # which AWS namespace each target observes.
    enabled: false
    pollInterval: "60s"  # CloudWatch resolution floor is 60s
    targets: []
    # Default pod-name → role mapping applied to every container_insights target
    # that doesn't override it. Strips the snowman / avalanche-test per-run
    # prefix-and-hash, leaving the deployment-name suffix as the role tag value.
    # Empty pattern disables the regex layer (RoleResolver still tries known
    # avalanche components via simplifyPodName).
    podNamePattern: "^svc-qa-[a-z0-9]+-(.+)$"
    podNameReplacement: "$1"
    # Example target shapes:
    # - kind: container_insights        # default if omitted
    #   region: "eu-central-1"
    #   clusterName: "sp-com-snplow-qa-aws-prod1-eks-cluster"
    #   namespace: "default"
    #   podNameInclude: ""           # optional Go regex; empty = match all
    #   podNameExclude: "^observer-" # optional Go regex; defaults to ^observer-
    #   podNamePattern: "^svc-qa-[a-z0-9]+-(.+)$"   # optional override of the
    #   podNameReplacement: "$1"                    #   defaults above (regex
    #                                               #   for stable role tag)
    # - kind: kinesis_stream
    #   region: "eu-central-1"
    #   streamName: "kns-com-snplow-qa-aws-qa-...-raw"
  image:
    repository: avalanche-observer-private
    tag: kubernetes
  # 0 = inherit from sizingPreset; set to a non-zero value to override.
  replicas: 0
  # When both observers run, the cloudwatch observer's componentId is suffixed
  # with "-cloudwatch"; the api observer keeps the base value below (for
  # backwards compatibility with existing test plans that reference
  # external-observer-kubernetes.yaml with name=k8s-observer-kubernetes).
  componentId: "k8s-observer-kubernetes"
  config:
    type: "kubernetes"
    name: "k8s-observer-kubernetes"
    # Scope configuration (api-mode only)
    namespace: ""  # Empty string means cluster-wide (requires ClusterRole)
    namespaces: []  # List of specific namespaces to monitor
    labelSelector: ""  # Kubernetes label selector (e.g., "app=snowplow")
    fieldSelector: ""  # Kubernetes field selector
    # QA-1057: scope which pods are RECORDED (not just which namespace is
    # watched), mirroring the cloudwatch observer's podNameInclude. Go regexes
    # matched against the pod name. Empty include = record all; empty exclude =
    # exclude none. Snowman sets podNameInclude to the run's qa-<hash> prefix so
    # a shared namespace (DS4's com-snplow-qa-aws-prod1) yields only the
    # pipeline-under-test + co-located avalanche pods, not every unrelated pod.
    podNameInclude: ""
    podNameExclude: ""
    # Polling configuration
    pollInterval: "10s"
    # podNamePattern / podNameReplacement: regex fallback used by RoleResolver
    # when neither `app.kubernetes.io/name` nor `app` labels are set on the
    # pod. Defaults match the snowman / avalanche-test naming convention so
    # the per-run hash is stripped to leave the deployment-name as the role.
    # Set podNamePattern to "" to skip the regex layer entirely.
    podNamePattern: "^svc-qa-[a-z0-9]+-(.+)$"
    podNameReplacement: "$1"
    # Metrics to collect (api-mode only)
    metrics:
      pods: true
      deployments: true
      events: true
      resources: true  # Requires metrics-server
  serviceAccount:
    # IRSA role ARN. Annotated on the observer-kubernetes ServiceAccount
    # whenever it is set — applies to api-mode and/or cloudwatch-mode, not
    # cloudwatch-only (required for the cloudwatch observer to read CloudWatch;
    # also usable by the api observer if it needs AWS access). Only applied to a
    # dedicated SA when cloudserviceaccount.deploy is false; when
    # cloudserviceaccount is deployed, observer-kubernetes reuses it and inherits
    # its IRSA role instead, so this field is not used in that case.
    iamRoleArn: ""
  # {} = inherit from sizingPreset; set requests/limits to override.
  resources: {}

# Logging configuration
logging:
  # Fluent Bit DaemonSet for shipping logs to Loki (local development)
  fluentbit:
    # Enable Fluent Bit DaemonSet
    enabled: false
    # Loki endpoint (host.docker.internal for accessing host from Kubernetes)
    lokiHost: "host.docker.internal"
    lokiPort: 3100
    # Fluent Bit image
    image:
      repository: fluent/fluent-bit
      tag: "3.0"
      pullPolicy: IfNotPresent
    # Resource limits for DaemonSet pods
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"
