# Cloud provider. Gates cloud-specific curated policies (aws|gcp|azure).
global:
  cloud: ""

# Extra labels applied to every policy and RBAC object
labels: {}

# ---------------------------------------------------------------------------
# Curated catalog of opinionated Kyverno policies.
# ---------------------------------------------------------------------------
policies:
  # AWS-only. Bridges ACK ACM Certificate CRs to ACK Route53 RecordSet CRs for
  # DNS-01 validation: on Certificate CREATE/UPDATE, once the ACK ACM controller
  # has populated status.domainValidations[], generate the validation CNAME
  # RecordSet in the hosted zone named by the Certificate annotation. The
  # generated RecordSet carries an ownerReference back to the Certificate so it
  # cascade-deletes. Requires Kyverno + the ACK ACM and Route53 controllers.
  ackAcmDnsValidation:
    enabled: false
    # Annotation on the Certificate carrying the target Route53 hosted zone ID.
    hostedZoneAnnotation: snowplow.io/hosted-zone-id
    # TTL (seconds) for the generated validation RecordSet.
    ttl: 60

# Data-driven families: N policies of any kyverno kind, supplied as data. The
# chart adds naming, standard labels and (for policies that act on cluster
# resources) an aggregated ClusterRole built from rbac.rules.
customPolicies: []
