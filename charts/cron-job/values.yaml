global:
  # -- Cloud specific bindings (options: aws, gcp, azure)
  cloud: ""

  # -- Global labels deployed to all resources deployed by the chart
  labels: {}

# -- Overrides the full-name given to the deployment resources (default: .Release.Name)
fullnameOverride: ""

schedules: []
# - suspend: false
#   crontab: "*/1 * * * *"
#   name: "default" # Each schedule must have a unique name
#   env: {}
#     hello_env: "world"
concurrencyPolicy: "Forbid"
restartPolicy: "Never"
failedJobsHistoryLimit: 1
successfulJobsHistoryLimit: 1
# -- TTL (in seconds) for cleaning up finished jobs (both failed and successful)
# ttlSecondsAfterFinished: 604800  # 7 days
# -- The number of retries to attempt before marking the job as failed
backoffLimit: 6
# -- The number of seconds the job is allowed to run before being terminated (optional)
# activeDeadlineSeconds: 600

image:
  repository: "busybox"
  tag: "latest"
  # -- Whether the repository is public
  isRepositoryPublic: true
  # -- The image pullPolicy to use
  pullPolicy: "IfNotPresent"

config:
  command: []
  #  - "/bin/sh"
  args: []
  #  - "-c"
  #  - "echo 'Environment $(hello_env)! Secret $(username).'"

  # -- Optional working directory for the container process.
  # Useful when readOnlyRootFilesystem is true and the job writes to its CWD;
  # point at a writable mount declared via extraVolumes / extraVolumeMounts.
  workingDir: ""

  # -- Map of environment variables to use within the job
  env: {}
  #  hello_env: "world"

  # -- Map of secrets that will be exposed as environment variables within the job
  secrets: {}
  #  username: "password"

# -- List of config maps to mount to the deployment
configMaps: []
#  - name: "volume-1"
#    mountPath: "/etc/config" # Must be unique
#    mountPropagation: None # If unset will default to 'None'
#    files: []
#      - key: "file.cfg" # Key must be unique for each file
#        contentsB64: "" # The file contents which have already been base-64 encoded
#        contentsFile: "" # The path to a local file (note: contentsB64 will take precedence if not-empty)

# -- Map of resource constraints for the deployment
resources: {}
#  limits:
#    cpu: 746m
#    memory: 900Mi
#  requests:
#    cpu: 400m
#    memory: 512Mi

# -- Container security context configuration
# These defaults follow kubesec.io best practices for hardened deployments.
#
# runAsUser / runAsGroup are intentionally not pinned. Different container
# images bake in different non-root USER directives, and forcing a specific
# UID can prevent the image's user from accessing its own files. The image's
# USER directive selects the runtime UID; runAsNonRoot: true still enforces
# the non-root invariant. Override per-deployment if you need a specific UID.
#
# readOnlyRootFilesystem defaults to false so existing deployments are not
# broken on upgrade; set it to true per-deployment once writable paths
# (e.g. /tmp) are mounted as emptyDirs.
containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# -- Additional volumes to attach to the pod spec.
# Useful with readOnlyRootFilesystem: true — declare writable scratch space
# (e.g. emptyDir on /tmp) without disabling the hardened default.
extraVolumes: []
#  - name: tmp
#    emptyDir: {}

# -- Additional volume mounts to attach to the container.
# Pair with extraVolumes above.
extraVolumeMounts: []
#  - name: tmp
#    mountPath: /tmp

dockerconfigjson:
  # -- Name of the secret to use for the private repository
  name: "snowplow-cron-job-dockerhub"
  # -- Username for the private repository
  username: ""
  # -- Password for the private repository
  password: ""
  # -- Repository server URL
  server: "https://index.docker.io/v1/"
  # -- Email address for user of the private repository
  email: ""

cloudserviceaccount:
  # -- Whether to create a service-account
  deploy: false
  # -- Name of the service-account to create
  name: "snowplow-cron-job-service-account"
  aws:
    # -- IAM Role ARN to bind to the k8s service account
    roleARN: ""
  gcp:
    # -- Service Account email to bind to the k8s service account
    serviceAccount: ""
  azure:
    # -- Workload managed identity id to bind to the k8s service account
    managedIdentityId: ""

customRole:
  # -- Whether to deploy the custom role and bind it to the cloudserviceaccount
  deploy: false
  # -- Array of role definitions to setup for the custom role
  definition: []
